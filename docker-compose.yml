# Proyecto AISLABLE (KER-60). El nombre de proyecto default es "keru-api" (el mismo se corra
# desde el checkout base, un worktree o el CI). Para levantar N stacks EN PARALELO sin colisión
# —p. ej. verificación aislada por tarea— pasá `-p keru-<tarea>`: docker compose nombra los
# contenedores y prefija los volúmenes por proyecto, así que NO hay container_name fijos.
# Los puertos de host salen por env con default = valor histórico (el CI y el dev quedan igual);
# poniéndolos en 0 se publican EFÍMEROS y se descubren con `docker compose -p <proj> port <svc> <puerto>`.
name: keru-api

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: keru
      POSTGRES_PASSWORD: keru
      POSTGRES_DB: keru
    ports:
      # Default 5432 (dev/CI intactos); POSTGRES_HOST_PORT=0 publica efímero para correr en paralelo.
      - '${POSTGRES_HOST_PORT:-5432}:5432'
    volumes:
      - keru_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U keru']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      # Default 6379; REDIS_HOST_PORT=0 publica efímero (aislamiento por tarea).
      - '${REDIS_HOST_PORT:-6379}:6379'
    volumes:
      - keru_redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  # Floci: emulador AWS local (estilo LocalStack). Emula SES (email de invitación, UC-03)
  # y S3 (fotos de perfil, UC-01/02/06). Edge en :4566; las credenciales son ignoradas.
  floci:
    image: floci/floci:latest
    restart: unless-stopped
    ports:
      # Default 4566; FLOCI_HOST_PORT=0 publica efímero (aislamiento por tarea).
      - '${FLOCI_HOST_PORT:-4566}:4566'
    environment:
      AWS_DEFAULT_REGION: us-east-1
      SERVICES: ses,s3
    volumes:
      - keru_flocidata:/data

  # Modo producción local. Detrás del profile "app": `docker compose up -d` levanta solo infra;
  # `docker compose --profile app up -d --build` levanta también la API y la webapp compilada.
  api:
    build: .
    restart: unless-stopped
    profiles: ['app']
    ports:
      # Puerto publicado en el host configurable: API_PORT=3001 si el :3000 ya lo
      # ocupa la API dev (npm run start:dev), o API_PORT=0 para efímero (aislamiento).
      # Adentro de la red siempre es 3000.
      - '${API_PORT:-3000}:3000'
    environment:
      PORT: 3000
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: keru
      DB_PASSWORD: keru
      DB_NAME: keru
      # KER-29: el esquema lo aplican las migraciones al bootear (abajo), nunca synchronize.
      DB_SYNCHRONIZE: 'false'
      DB_MIGRATIONS_RUN: 'true'
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev-secret-change-me
      JWT_EXPIRES: 7d
      # AWS contra el emulador floci (SES para el email de invitación, S3 para fotos).
      AWS_REGION: us-east-1
      AWS_ENDPOINT_URL: http://floci:4566
      SES_FROM: no-reply@keru.ar
      S3_BUCKET: keru-media
      # CDN de fotos POR AMBIENTE (KER-70): deploy dev -> https://cdn.dev.keru.ar/media,
      # prod -> https://cdn.keru.ar/media (mismo host que EMAIL_LOGO_URL). En este stack LOCAL se
      # deja relativa: nginx proxya /media -> floci/keru-media (subidas emuladas, sin depender del CDN).
      S3_PUBLIC_URL: /media
      # Logo de email (KER-70): asset estático servido por el CDN de marca por ambiente. Este stack
      # es dev -> cdn.dev.keru.ar (el logo no depende de floci; se sirve del CDN público igual).
      EMAIL_LOGO_URL: https://cdn.dev.keru.ar/email/keru-logo.png
      # Origen de la webapp servida por nginx (links de invitación en emails).
      APP_BASE_URL: http://localhost:8080
      # Web Push VAPID (UC-18): SIN default con claves (incidente GitGuardian 2026-07-22).
      # Inyectar por env del host; vacío = push deshabilitado, la campana sigue (§2.7).
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:no-reply@keru.ar}
      # KER-14: en este stack local la suite E2E hace varios signups por corrida detrás del
      # nginx (una sola IP); en prod real dejar el default estricto (5/min) sin esta env.
      THROTTLE_AUTH_LIMIT: ${THROTTLE_AUTH_LIMIT:-50}
      # Bypass total de rate limiting para e2e en CI (nunca en despliegues reales).
      THROTTLE_SKIP: '${THROTTLE_SKIP:-false}' 
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      floci:
        condition: service_healthy
    # KER-33: probe real de la API (DB + Redis + lag del outbox); 503 = unhealthy y el
    # orquestador la reinicia. wget viene en busybox (node:alpine), no hace falta curl.
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/v1/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # KER-35 (NFR-25, T14): backup lógico automatizado del store (pg_dump -Fc) con retención
  # por cantidad. Corre en el profile "app" (stack prod-like): `docker compose --profile app
  # up -d` lo deja ciclando. Restore drill: scripts/restore-drill.sh|ps1; procedimiento,
  # RPO/RTO y gap-disclosure (sin PITR, sin offsite) en docs/ops/backups.md.
  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles: ['app']
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: keru
      PGPASSWORD: keru
      PGDATABASE: keru
      # Cada cuánto se corta un dump (RPO efectivo) y cuántos se retienen (poda por cantidad).
      # Defaults: cada 6h, 28 dumps ≈ 7 días. Overrideables por env del host (.env.example).
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-21600}
      BACKUP_KEEP: ${BACKUP_KEEP:-28}
    volumes:
      - keru_backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    # Cron simple en sh: dump a .part -> rename atómico -> poda -> sleep. El .part evita que
    # la poda o un restore vean un dump a medio escribir; un dump fallido no pisa los previos.
    entrypoint:
      - /bin/sh
      - -ec
      - |
        while true; do
          ts=$$(date -u +%Y%m%dT%H%M%SZ)
          if pg_dump -Fc -f "/backups/.$$ts.part"; then
            mv "/backups/.$$ts.part" "/backups/keru-$$ts.dump"
            echo "backup OK: keru-$$ts.dump ($$(wc -c < "/backups/keru-$$ts.dump") bytes)"
            ls -1t /backups/keru-*.dump | tail -n +$$((BACKUP_KEEP + 1)) | xargs -r rm -f
          else
            rm -f "/backups/.$$ts.part"
            echo "backup FAILED: $$ts" >&2
          fi
          sleep "$$BACKUP_INTERVAL_SECONDS"
        done
    healthcheck:
      # Sano = existe al menos un dump terminado; start_period cubre el primer ciclo.
      test: ['CMD-SHELL', 'ls /backups/keru-*.dump >/dev/null 2>&1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s

  # Webapp Angular compilada, servida por nginx (mismo profile "app"). El nginx proxya
  # /api -> api:3000 y /media -> floci (ver nginx.conf en Keru-Webapp). El repo de la
  # webapp se asume hermano de este; si no, apuntar KERU_WEBAPP_DIR a su checkout.
  webapp:
    build:
      context: ${KERU_WEBAPP_DIR:-../Keru-Webapp}
    restart: unless-stopped
    profiles: ['app']
    ports:
      # Default 8080; WEBAPP_HOST_PORT=0 publica efímero. (La verificación aislada NO usa
      # este servicio: corre la webapp por `ng serve` — más liviano y espeja el CI.)
      - '${WEBAPP_HOST_PORT:-8080}:80'
    depends_on:
      api:
        condition: service_healthy

volumes:
  keru_pgdata:
  keru_redisdata:
  keru_flocidata:
  # KER-35: dumps del servicio backup. Mismo host que la base (gap conocido: sin offsite).
  keru_backups:
