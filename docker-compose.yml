# Nombre de proyecto fijo: los container_name/volúmenes son los mismos se corra desde
# donde se corra (checkout base, worktree de tarea o CI) — sin colisiones ni duplicados.
name: keru-api

services:
  postgres:
    image: postgres:16-alpine
    container_name: keru-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: keru
      POSTGRES_PASSWORD: keru
      POSTGRES_DB: keru
    ports:
      - '5432:5432'
    volumes:
      - keru_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U keru']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: keru-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - keru_redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  # Floci: emulador AWS local (estilo LocalStack). Emula SES (email de invitación, UC-03)
  # y S3 (fotos de perfil, UC-01/02/06). Edge en :4566; las credenciales son ignoradas.
  floci:
    image: floci/floci:latest
    container_name: keru-floci
    restart: unless-stopped
    ports:
      - '4566:4566'
    environment:
      AWS_DEFAULT_REGION: us-east-1
      SERVICES: ses,s3
    volumes:
      - keru_flocidata:/data

  # Modo producción local. Detrás del profile "app": `docker compose up -d` levanta solo infra;
  # `docker compose --profile app up -d --build` levanta también la API y la webapp compilada.
  api:
    build: .
    container_name: keru-api
    restart: unless-stopped
    profiles: ['app']
    ports:
      # Puerto publicado en el host configurable: API_PORT=3001 si el :3000 ya lo
      # ocupa la API dev (npm run start:dev). Adentro de la red siempre es 3000.
      - '${API_PORT:-3000}:3000'
    environment:
      PORT: 3000
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: keru
      DB_PASSWORD: keru
      DB_NAME: keru
      DB_SYNCHRONIZE: 'true'
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev-secret-change-me
      JWT_EXPIRES: 7d
      # AWS contra el emulador floci (SES para el email de invitación, S3 para fotos).
      AWS_REGION: us-east-1
      AWS_ENDPOINT_URL: http://floci:4566
      SES_FROM: no-reply@keru.app
      S3_BUCKET: keru-media
      # photoUrl relativa al origen de la webapp: nginx proxya /media -> floci/keru-media.
      S3_PUBLIC_URL: /media
      # Origen de la webapp servida por nginx (links de invitación en emails).
      APP_BASE_URL: http://localhost:8080
      # Web Push VAPID (UC-18): par de DEV por defecto; en prod inyectar el propio.
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-BB7iT-LtYzEkg9Il74b4bu-hKZVls6rbMKyfsoOlFHhRr1bSx9Jfnon5D4ypokrMudWNSO_u_pY9HSYvCp_kaIQ}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-HgvLYRBz-DgW3qFKFEf8Dd9suuQnKuRCz0qTLXaiTik}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:no-reply@keru.app}
      # KER-14: en este stack local la suite E2E hace varios signups por corrida detrás del
      # nginx (una sola IP); en prod real dejar el default estricto (5/min) sin esta env.
      THROTTLE_AUTH_LIMIT: ${THROTTLE_AUTH_LIMIT:-50}
      # Bypass total de rate limiting para e2e en CI (nunca en despliegues reales).
      THROTTLE_SKIP: '${THROTTLE_SKIP:-false}' 
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      floci:
        condition: service_healthy

  # Webapp Angular compilada, servida por nginx (mismo profile "app"). El nginx proxya
  # /api -> api:3000 y /media -> floci (ver nginx.conf en Keru-Webapp). El repo de la
  # webapp se asume hermano de este; si no, apuntar KERU_WEBAPP_DIR a su checkout.
  webapp:
    build:
      context: ${KERU_WEBAPP_DIR:-../Keru-Webapp}
    container_name: keru-webapp
    restart: unless-stopped
    profiles: ['app']
    ports:
      - '8080:80'
    depends_on:
      api:
        condition: service_started

volumes:
  keru_pgdata:
  keru_redisdata:
  keru_flocidata:
