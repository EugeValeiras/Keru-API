name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Secret scanning (KER-25): guardrail tras el incidente VAPID (GitGuardian 2026-07-22).
  # Bloqueante: un secreto en el diff del PR (o en el working tree de main) tumba el CI.
  # No se escanea el historial completo: los commits previos a la rotación (PR #15)
  # contienen el par VAPID viejo, ya inerte. Config y allowlist en .gitleaks.toml.
  secret-scanning:
    name: gitleaks (secret scanning)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # El scan del PR necesita los commits de base y head para armar el rango
          fetch-depth: 0

      - name: Instalar gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks

      - name: Secretos en el diff del PR (bloqueante)
        if: github.event_name == 'pull_request'
        run: >
          gitleaks git . --no-banner --redact=50 --verbose
          --log-opts="--no-merges ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"

      - name: Secretos en el working tree (bloqueante)
        if: github.event_name != 'pull_request'
        run: gitleaks dir . --no-banner --redact=50 --verbose

  build-lint-test:
    name: build + lint + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      # Fitness functions (constitution §3.4 / §5): fronteras IDesign + operation-identity.
      # Bloqueante: cualquier violación de capas tumba el pipeline.
      - name: Lint de fronteras (bloqueante)
        run: npm run lint:ci

      - name: Build
        run: npm run build

      - name: Tests unitarios (jest)
        run: npm test

  # Migraciones (KER-29 / NFR-25): prueba el flujo real de despliegue — base vacía +
  # migration:run + boot de la app completa con synchronize APAGADO (el modo
  # GENERATE_OPENAPI levanta el AppModule entero, conexión TypeORM incluida, y sale).
  # Si una entidad cambia sin su migración, este job se rompe.
  migrations:
    name: migraciones (base vacía + migration:run + boot)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: keru
          POSTGRES_PASSWORD: keru
          POSTGRES_DB: keru
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U keru"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Migraciones sobre base vacía
        run: npm run migration:run

      - name: Boot con synchronize apagado
        env:
          DB_SYNCHRONIZE: 'false'
          GENERATE_OPENAPI: 'true'
        run: npm run start

  # E2E de la API (KER-28): supertest contra la app real booteada (AppModule completo,
  # autorización real por vínculo/asignación). La infra sale de services del job; la suite
  # recrea su base keru_e2e en el globalSetup con synchronize=true EXPLÍCITO (opt-in
  # documentado en test/e2e-env.ts) — la fidelidad de las migraciones la cubre el job
  # `migrations`, así este no necesita seed ni migration:run.
  e2e:
    name: e2e (supertest + postgres/redis)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: keru
          POSTGRES_PASSWORD: keru
          POSTGRES_DB: keru
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U keru"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      # Floci: emulador S3 (KER-52). El e2e sube/descarga el documento privado de una certificación
      # (POST /files/documents) contra almacenamiento real — mismo emulador que docker-compose y
      # verify-isolated. Sin él, el S3Client cae a la cadena default de credenciales (CredentialsProviderError).
      floci:
        image: floci/floci:latest
        env:
          AWS_DEFAULT_REGION: us-east-1
          SERVICES: ses,s3
        ports:
          - 4566:4566
    # El e2e apunta el S3Client a floci; las credenciales estáticas ('local') las setea
    # FileStorageUtility cuando AWS_ENDPOINT_URL está presente (floci las ignora).
    env:
      AWS_ENDPOINT_URL: http://localhost:4566
      AWS_REGION: us-east-1
      S3_BUCKET: keru-media
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Esperar a floci (S3)
        run: |
          for i in $(seq 1 30); do
            if curl -s -o /dev/null http://localhost:4566; then echo "floci up"; exit 0; fi
            sleep 2
          done
          echo "floci no respondió en :4566" >&2; exit 1

      - name: Tests e2e (jest + supertest)
        run: npm run test:e2e
