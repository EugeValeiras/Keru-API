name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-lint-test:
    name: build + lint + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      # Fitness functions (constitution §3.4 / §5): fronteras IDesign + operation-identity.
      # Bloqueante: cualquier violación de capas tumba el pipeline.
      - name: Lint de fronteras (bloqueante)
        run: npm run lint:ci

      - name: Build
        run: npm run build

      - name: Tests unitarios (jest)
        run: npm test
